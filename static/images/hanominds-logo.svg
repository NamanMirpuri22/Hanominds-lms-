<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <!-- Lightbulb outer circle - Yellow -->
  <circle cx="100" cy="70" r="60" fill="#FBBF24" stroke="#F59E0B" stroke-width="2"/>
  
  <!-- Lightbulb shine - light yellow -->
  <ellipse cx="75" cy="45" rx="20" ry="25" fill="#FCD34D" opacity="0.6"/>
  
  <!-- Brain inside - Cyan -->
  <circle cx="90" cy="60" r="15" fill="#0891B2" stroke="#06B6D4" stroke-width="1.5"/>
  <circle cx="110" cy="60" r="15" fill="#0891B2" stroke="#06B6D4" stroke-width="1.5"/>
  
  <!-- Brain convolutions - darker cyan -->
  <path d="M 95 50 Q 100 45 105 50" stroke="#06B6D4" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 90 65 Q 95 70 100 65" stroke="#06B6D4" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 105 65 Q 110 70 115 65" stroke="#06B6D4" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Lightbulb base - Dark stripes -->
  <rect x="85" y="125" width="30" height="8" fill="#1E293B" rx="2"/>
  <rect x="82" y="133" width="36" height="6" fill="#0891B2" rx="1"/>
  <rect x="85" y="139" width="30" height="8" fill="#1E293B" rx="2"/>
  
  <!-- Contact points - Cyan -->
  <circle cx="92" cy="148" r="3" fill="#0891B2"/>
  <circle cx="108" cy="148" r="3" fill="#0891B2"/>
  
  <!-- Light rays -->
  <line x1="40" y1="30" x2="20" y2="10" stroke="#FBBF24" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="160" y1="30" x2="180" y2="10" stroke="#FBBF24" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="30" y1="70" x2="5" y2="70" stroke="#FBBF24" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="170" y1="70" x2="195" y2="70" stroke="#FBBF24" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
</svg>
